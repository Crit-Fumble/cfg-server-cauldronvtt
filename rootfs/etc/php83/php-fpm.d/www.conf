; php-fpm pool for Cauldron VTT, sized for the `nano` tier (0.25 thread / 512 MB).
;
; ⚠️ The child count is driven by ARGON2, not by request throughput.
;
; Banshee hashes with PASSWORD_ARGON2I (libraries/banshee/core/banshee.php:16),
; and PHP's argon2i defaults to m=65536 — every password_hash/password_verify
; transiently allocates ~64 MB. The realistic worst case is not steady traffic,
; it is a whole party hitting the login form at the same moment when a session
; starts. Four concurrent logins would spike ~256 MB on top of MariaDB and
; nginx, which is uncomfortably close to the 512 MB cap.
;
; Three children bounds that spike at ~192 MB while still serving a group
; comfortably, because everything after login is cheap. Raise this only
; together with the memory tier — they are coupled.

[www]
user = www-data
group = www-data

listen = /run/php/php-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; ondemand rather than dynamic: a VTT is idle far more often than it is busy,
; and idle children are memory we are paying for. The startup cost of forking a
; child is irrelevant next to a 64 MB argon2 hash.
pm = ondemand
pm.max_children = 3
pm.process_idle_timeout = 30s
pm.max_requests = 200

; Surface PHP errors in the container log rather than to the browser —
; DEBUG_MODE is forced off in banshee.conf, so users must never see a stack
; trace, but operators still need one.
catch_workers_output = yes
decorate_workers_output = no
php_admin_value[error_log] = /dev/stderr
php_admin_flag[log_errors] = on
php_admin_flag[display_errors] = off

; Uploads: map backgrounds can be video. Keep these in step with nginx's
; client_max_body_size (256m) or the larger of the two is a lie.
php_admin_value[upload_max_filesize] = 256M
php_admin_value[post_max_size] = 256M
php_admin_value[memory_limit] = 128M
php_admin_value[max_execution_time] = 120

; Sessions live on disk in the container, not in /data: they are per-boot state
; and persisting them across container replacement buys nothing.
php_admin_value[session.save_path] = /tmp/php-sessions
php_admin_flag[session.cookie_httponly] = on
php_admin_value[session.cookie_samesite] = Lax
