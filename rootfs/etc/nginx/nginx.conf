# nginx for Cauldron VTT — replaces the shipped .htaccess, which upstream's
# INSTALL expects you to hand-translate for any non-Apache webserver.
#
# Sized for the `nano` tier: one worker is ample for a single group's VTT, and
# each extra worker is memory we would rather leave to MariaDB.

user www-data;
worker_processes 1;
error_log /dev/stderr warn;
pid /run/nginx/nginx.pid;

events {
	worker_connections 512;
}

http {
	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	access_log off;
	sendfile on;
	tcp_nopush on;
	keepalive_timeout 65;
	server_tokens off;

	# Map backgrounds may be video (MAP_VIDEO_EXTENSIONS covers avi/mp4/mpg/webm),
	# so the default 1m body limit would reject perfectly ordinary uploads.
	client_max_body_size 256m;
	client_body_temp_path /var/lib/nginx/tmp 1 2;

	gzip on;
	gzip_types text/plain text/css application/javascript application/json image/svg+xml;
	gzip_min_length 1024;

	server {
		listen 80 default_server;
		server_name _;
		root /var/www/cauldron/public;
		index index.php;

		# ── Realtime ────────────────────────────────────────────────────────
		# cauldrond speaks plain ws:// and has no TLS of its own. Proxying it
		# here means the container exposes a single port and the platform's
		# terminator only needs one upstream.
		#
		# The long read timeout matters: a VTT session is mostly idle between
		# token moves, and the default 60s would drop quiet tables.
		location /websocket {
			proxy_pass http://127.0.0.1:2001;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection "upgrade";
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_read_timeout 3600s;
			proxy_send_timeout 3600s;
		}

		# ── User-writable trees: serve as inert bytes, never execute ────────
		# SECURITY: /files and /resources hold user uploads. Apache with
		# mod_php would happily execute a .php dropped there; nginx only runs
		# what we explicitly hand to fastcgi, and we hand it exactly one file
		# (see the `location = /index.php` block). These blocks additionally
		# make the intent explicit and defeat any future generic php handler.
		location ~ ^/(files|resources)/ {
			location ~ \.(php|phar|phtml|phps)$ { deny all; }
			try_files $uri =404;
			add_header X-Content-Type-Options nosniff always;
		}

		# Static trees mirror the .htaccess exclusion list: a miss here is a
		# 404, not a route into the application.
		location ~ ^/(css|fonts|images|js)/ {
			try_files $uri =404;
			expires 7d;
			access_log off;
		}

		location = /favicon.ico { try_files $uri =404; access_log off; }
		location = /robots.txt  { try_files $uri =404; access_log off; }

		# ── Application ─────────────────────────────────────────────────────
		# Everything else is a Banshee route. This is the .htaccess rule:
		#   !-f and not a static dir  ->  /index.php
		location / {
			try_files $uri /index.php$is_args$args;
		}

		# The ONLY path that reaches PHP. Deliberately `location =` rather than
		# a `\.php$` regex — see the security note above.
		location = /index.php {
			include /etc/nginx/fastcgi.conf;
			fastcgi_pass unix:/run/php/php-fpm.sock;
			fastcgi_param SCRIPT_FILENAME /var/www/cauldron/public/index.php;
			fastcgi_read_timeout 120s;
			fastcgi_buffers 8 16k;
			fastcgi_buffer_size 32k;
		}

		# Dotfiles are never content.
		location ~ /\. { deny all; }
	}

	# ── Activity probe endpoint ─────────────────────────────────────────────
	# A dedicated port serving only nginx stub_status, for the platform's
	# per-kind activity probe (cfg-core-server activity-probes/cauldronvtt).
	# The probe reads "Active connections" to decide whether anyone is at the
	# table, so an idle instance can be torn down instead of billing CT forever.
	#
	# Why a separate port, not a /nginx_status location on :80: the platform
	# proxies the whole cauldronvtt subdomain through :80, so any path there is
	# publicly reachable (behind the pin cookie). This port is published to the
	# Docker host but NOT routed by Caddy, so only the probe (on the same host)
	# reaches it — no public exposure, no IP-allow rule that Docker's gateway
	# rewriting would defeat. stub_status leaks only connection counts, never
	# table data. http_stub_status_module ships in the stock Alpine nginx.
	server {
		listen 8080;
		server_name _;
		access_log off;

		location = /nginx_status {
			stub_status;
		}
		location / { return 404; }
	}
}
